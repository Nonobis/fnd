<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face Management - FND</title>
    <link rel="stylesheet" href="/static/bulma.min.css">
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/htmx.min.js"></script>
    <style>
        .face-card {
            margin-bottom: 1rem;
        }
        .face-image {
            max-width: 100px;
            max-height: 100px;
            object-fit: cover;
            border-radius: 4px;
        }
        .face-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .face-details {
            flex: 1;
        }
        .face-actions {
            display: flex;
            gap: 0.5rem;
        }
        .empty-state {
            text-align: center;
            padding: 2rem;
            color: #7a7a7a;
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        .help-text {
            font-size: 0.875rem;
            color: #7a7a7a;
            margin-top: 0.25rem;
        }
        .faces-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }
        .face-placeholder {
            width: 100px;
            height: 100px;
            background: #f5f5f5;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #7a7a7a;
        }
    </style>
</head>
<body>
<div id="face-management-settings" class="settings-container">
    <!-- Header Section -->
    <div class="settings-header">
        <h1 class="title is-2">
            <span class="icon-text">
                <span class="icon">
                    <i class="fas fa-users"></i>
                </span>
                <span>Face Management</span>
            </span>
        </h1>
        <p class="subtitle is-6">Manage known faces for facial recognition</p>
    </div>

    <!-- Main Content -->
    <div class="settings-card">
        <div class="settings-card-header">
            <h2 class="title is-4">
                <span class="icon-text">
                    <span class="icon">
                        <i class="fas fa-database"></i>
                    </span>
                    <span>Face Database</span>
                </span>
            </h2>
        </div>
        <div class="settings-card-body">
            <div class="content">
                <p>Add and manage faces that will be recognized by the facial recognition system. Each face requires a clear image and a name.</p>
                
                <div class="buttons">
                    <button class="button is-success" 
                            hx-get="/api/facial-recognition/faces" 
                            hx-target="#faces-list" 
                            hx-swap="outerHTML">
                        <span class="icon">
                            <i class="fas fa-users"></i>
                        </span>
                        <span>View All Faces</span>
                    </button>
                    <button class="button is-info" 
                            hx-get="/api/facial-recognition/faces/add" 
                            hx-target="#face-form" 
                            hx-swap="outerHTML">
                        <span class="icon">
                            <i class="fas fa-user-plus"></i>
                        </span>
                        <span>Add New Face</span>
                    </button>
                </div>

                <div id="faces-list">
                    <div class="empty-state">
                        <span class="icon is-large">
                            <i class="fas fa-users"></i>
                        </span>
                        <p class="mt-3">No faces in database yet. Click "Add New Face" to get started.</p>
                    </div>
                </div>
                
                <div id="face-form"></div>
            </div>
        </div>
    </div>
</div>

<script>
    // Auto-refresh status when configuration changes
    document.addEventListener('htmx:afterRequest', function(event) {
        if (event.detail.xhr.status === 200) {
            // Refresh overview status if we're on the overview page
            const overviewStatus = document.getElementById('facial-recognition-status');
            if (overviewStatus) {
                htmx.ajax('GET', '/api/overview/facial-recognition-status', {target: '#facial-recognition-status', swap: 'outerHTML'});
            }
        }
    });
</script>
</body>
</html>
