<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Object Filters - FND</title>
    <link rel="stylesheet" href="/static/bulma.min.css">
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/htmx.min.js"></script>
    <style>
        .camera-card {
            margin-bottom: 1.5rem;
        }
        .object-filter-status {
            margin-top: 0.5rem;
        }
        .filter-summary {
            font-size: 0.875rem;
            color: #7a7a7a;
        }
        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: #7a7a7a;
        }
    </style>
</head>
<body>
<div class="settings-container">
    <!-- Header Section -->
    <div class="settings-header">
        <h1 class="title is-2">
            <span class="icon-text">
                <span class="icon">
                    <i class="fas fa-filter"></i>
                </span>
                <span>Object Filters</span>
            </span>
        </h1>
        <p class="subtitle is-6">Configure which objects to monitor for each camera</p>
    </div>

    <!-- Info Section -->
    <div class="notification is-info is-light">
        <span class="icon">
            <i class="fas fa-info-circle"></i>
        </span>
        <span><strong>How it works:</strong> Enable object filtering for specific cameras to reduce notifications and improve performance. Only events with the selected objects will trigger notifications.</span>
    </div>

    <!-- Cameras List -->
    <div class="settings-card">
        <div class="settings-card-header">
            <h2 class="title is-4">
                <span class="icon-text">
                    <span class="icon">
                        <i class="fas fa-video"></i>
                    </span>
                    <span>Camera Configuration</span>
                </span>
            </h2>
        </div>
        <div class="settings-card-body">
            <div id="cameras-list">
                <!-- Loading indicator -->
                <div id="loading-indicator" class="has-text-centered py-6">
                    <span class="icon is-large">
                        <i class="fas fa-spinner fa-spin fa-2x"></i>
                    </span>
                    <p class="mt-3">Loading cameras...</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Load cameras list on page load
    document.addEventListener('DOMContentLoaded', function() {
        loadCamerasList();
    });

    function loadCamerasList() {
        const loadingIndicator = document.getElementById('loading-indicator');
        const camerasList = document.getElementById('cameras-list');
        
        // Show loading indicator
        if (loadingIndicator) {
            loadingIndicator.style.display = 'block';
        }
        
        fetch('/api/object-filters/cameras')
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                return response.json();
            })
            .then(cameras => {
                // Hide loading indicator
                if (loadingIndicator) {
                    loadingIndicator.style.display = 'none';
                }
                
                // Handle null or undefined cameras
                if (!cameras || cameras.length === 0) {
                    camerasList.innerHTML = `
                        <div class="empty-state">
                            <span class="icon is-large">
                                <i class="fas fa-video fa-3x"></i>
                            </span>
                            <p class="mt-3">No cameras found</p>
                            <p class="is-size-7">Make sure Frigate is running and accessible. Cameras will appear here once detected.</p>
                            <button class="button is-info mt-3" onclick="loadCamerasList()">
                                <span class="icon">
                                    <i class="fas fa-sync-alt"></i>
                                </span>
                                <span>Refresh</span>
                            </button>
                        </div>
                    `;
                    return;
                }

                let html = '';
                cameras.forEach(camera => {
                    const statusClass = camera.Active ? 'is-success' : 'is-danger';
                    const statusText = camera.Active ? 'Active' : 'Inactive';
                    const statusIcon = camera.Active ? 'fa-check-circle' : 'fa-times-circle';
                    
                    const filterStatus = camera.ObjectFilter.Enabled ? 
                        `<span class="tag is-info">Filtered (${camera.ObjectFilter.Objects.length} objects)</span>` :
                        '<span class="tag is-light">All objects</span>';
                    
                    const filterSummary = camera.ObjectFilter.Enabled && camera.ObjectFilter.Objects.length > 0 ?
                        `<div class="filter-summary">Watching: ${camera.ObjectFilter.Objects.join(', ')}</div>` :
                        '';

                    html += `
                        <div class="card camera-card">
                            <div class="card-content">
                                <div class="columns is-vcentered">
                                    <div class="column">
                                        <h3 class="title is-5">${camera.Name}</h3>
                                        <div class="object-filter-status">
                                            <span class="tag ${statusClass}">${statusText}</span>
                                            ${filterStatus}
                                        </div>
                                        ${filterSummary}
                                    </div>
                                    <div class="column is-narrow">
                                        <button class="button is-primary" 
                                                onclick="configureCamera('${camera.Name}')">
                                            <span class="icon">
                                                <i class="fas fa-cog"></i>
                                            </span>
                                            <span>Configure</span>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                });
                
                camerasList.innerHTML = html;
            })
            .catch(error => {
                console.error('Error loading cameras:', error);
                
                // Hide loading indicator
                if (loadingIndicator) {
                    loadingIndicator.style.display = 'none';
                }
                
                camerasList.innerHTML = `
                    <div class="notification is-danger is-light">
                        <span class="icon">
                            <i class="fas fa-exclamation-triangle"></i>
                        </span>
                        <span>Failed to load cameras: ${error.message}</span>
                        <button class="button is-danger is-small ml-3" onclick="loadCamerasList()">
                            <span class="icon">
                                <i class="fas fa-sync-alt"></i>
                            </span>
                            <span>Retry</span>
                        </button>
                    </div>
                `;
            });
    }

    function configureCamera(cameraName) {
        // Open camera configuration in a modal
        const modal = document.createElement('div');
        modal.className = 'modal is-active';
        modal.innerHTML = `
            <div class="modal-background" onclick="closeCameraModal()"></div>
            <div class="modal-card" style="width: 95%; max-width: 1200px;">
                <header class="modal-card-head">
                    <p class="modal-card-title">
                        <span class="icon-text">
                            <span class="icon">
                                <i class="fas fa-filter"></i>
                            </span>
                            <span>Object Filters - ${cameraName}</span>
                        </span>
                    </p>
                    <button class="delete" aria-label="close" onclick="closeCameraModal()"></button>
                </header>
                <section class="modal-card-body" id="camera-config-content">
                    <div class="has-text-centered py-6">
                        <span class="icon is-large">
                            <i class="fas fa-spinner fa-spin fa-2x"></i>
                        </span>
                        <p class="mt-3">Loading configuration...</p>
                    </div>
                </section>
            </div>
        `;
        
        document.body.appendChild(modal);
        
        // Load camera configuration
        fetch(`/api/object-filters/camera/${cameraName}`)
            .then(response => response.text())
            .then(html => {
                document.getElementById('camera-config-content').innerHTML = html;
            })
            .catch(error => {
                console.error('Error loading camera config:', error);
                document.getElementById('camera-config-content').innerHTML = `
                    <div class="notification is-danger is-light">
                        <span class="icon">
                            <i class="fas fa-exclamation-triangle"></i>
                        </span>
                        <span>Failed to load camera configuration: ${error.message}</span>
                    </div>
                `;
            });
    }
    
    function closeCameraModal() {
        const modal = document.querySelector('.modal.is-active');
        if (modal) {
            modal.remove();
        }
    }

    // Auto-refresh cameras list every 30 seconds
    setInterval(loadCamerasList, 30000);
</script>
</body>
</html>
