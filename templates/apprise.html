<div id="apprise-einstellungen">
    <div class="columns">


        <div class="column is-narrow">
            <h3 class="title is-3">Apprise</h3>
            <form hx-post="/htmx/apprise.html" hx-target="#apprise-einstellungen" hx-swap="outerHTML">
                <label class="label">{{index .TranslatedText 0}}</label>
                <div class="field">
                    <div class="control">
                        <label class="checkbox">
                            <input type="checkbox" name="aktiv" {{if .Active}}checked{{end}}>
                            {{index .TranslatedText 0}}
                        </label>
                    </div>
                </div>

                <div class="field">
                    <label class="label">{{index .TranslatedText 1}}</label>
                    <div class="control">
                        <input class="input" type="text" name="appriseConfigID" placeholder="{{ .AppriseConfigID }}">
                    </div>
                </div>

                <div class="field">
                    <label class="label">{{index .TranslatedText 4}}</label>
                    <div class="control">
                        <input class="input" type="text" name="serverURL" placeholder="{{ .ServerURL }}">
                    </div>
                </div>

                <div class="field">
                    <label class="label">{{index .TranslatedText 5}}</label>
                    <div class="control">
                        <input class="input" type="number" name="timeout" placeholder="{{ .Timeout }}" min="1" max="300">
                    </div>
                </div>

                <div class="field">
                    <label class="label">{{index .TranslatedText 6}}</label>
                    <div class="control">
                        <div class="select">
                            <select name="format">
                                <option value="text" {{if eq .Format "text"}}selected{{end}}>Text</option>
                                <option value="markdown" {{if eq .Format "markdown"}}selected{{end}}>Markdown</option>
                                <option value="html" {{if eq .Format "html"}}selected{{end}}>HTML</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="control">
                    <button class="button is-link">{{index .TranslatedText 3}}</button>
                </div>

                <br>
                {{ if .ShowStatus }}<span class="tag {{.Color}} is-normal">{{.StatusMessage}}</span>{{end}}

            </form>

        </div>

        <div class="column is-narrow">
            <ol>
                <li>{{index .TranslatedText 2}}</li>
            </ol>




        </div>



    </div>
</div>
