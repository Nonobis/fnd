<div id="apprise-settings">
    <div class="columns">


        <div class="column is-narrow">
            <h3 class="title is-3">Apprise</h3>
            <form hx-post="/htmx/apprise.html" hx-target="#apprise-settings" hx-swap="outerHTML">
                <label class="label">{{index .TranslatedText 0}}</label>
                <div class="field">
                    <div class="control">
                        <label class="checkbox">
                            <input type="checkbox" name="active" id="apprise-active" {{if .Active}}checked{{end}} onchange="toggleAppriseFields()">
                            {{index .TranslatedText 0}}
                        </label>
                    </div>
                </div>

                <div class="field">
                    <label class="label">{{index .TranslatedText 1}}</label>
                    <div class="control">
                        <input class="input apprise-field" type="text" name="appriseConfigID" placeholder="{{ .AppriseConfigID }}" {{if not .Active}}disabled{{end}}>
                    </div>
                </div>

                <div class="field">
                    <label class="label">{{index .TranslatedText 4}}</label>
                    <div class="control">
                        <input class="input apprise-field" type="text" name="serverURL" placeholder="{{ .ServerURL }}" {{if not .Active}}disabled{{end}}>
                    </div>
                </div>

                <div class="field">
                    <label class="label">{{index .TranslatedText 5}}</label>
                    <div class="control">
                        <input class="input apprise-field" type="number" name="timeout" placeholder="{{ .Timeout }}" min="1" max="300" {{if not .Active}}disabled{{end}}>
                    </div>
                </div>

                <div class="field">
                    <label class="label">{{index .TranslatedText 6}}</label>
                    <div class="control">
                        <div class="select">
                            <select name="format" class="apprise-field" {{if not .Active}}disabled{{end}}>
                                <option value="text" {{if eq .Format "text"}}selected{{end}}>Text</option>
                                <option value="markdown" {{if eq .Format "markdown"}}selected{{end}}>Markdown</option>
                                <option value="html" {{if eq .Format "html"}}selected{{end}}>HTML</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="control">
                    <button class="button is-link apprise-field" {{if not .Active}}disabled{{end}}>{{index .TranslatedText 3}}</button>
                </div>

                <br>
                {{ if .ShowStatus }}<span class="tag {{.Color}} is-normal">{{.StatusMessage}}</span>{{end}}

            </form>

        </div>

        <div class="column is-narrow">
            <ol>
                <li>{{index .TranslatedText 2}}</li>
            </ol>




        </div>



    </div>

    <script>
        function toggleAppriseFields() {
            const isActive = document.getElementById('apprise-active').checked;
            const fields = document.querySelectorAll('.apprise-field');
            fields.forEach(field => {
                field.disabled = !isActive;
                if (isActive) {
                    field.classList.remove('is-disabled');
                } else {
                    field.classList.add('is-disabled');
                }
            });
        }
    </script>
</div>
