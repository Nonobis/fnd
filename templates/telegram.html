<div id="telegram-settings">
    <div class="columns">


        <div class="column is-narrow">
            <h3 class="title is-3">Telegram</h3>
            <form hx-post="/htmx/telegram.html" hx-target="#telegram-settings" hx-swap="outerHTML">

                <label class="label">{{index .TranslatedText 0}}</label>
                <div class="field">
                    <div class="control">
                        <label class="checkbox">
                            <input type="checkbox" name="active" id="telegram-active" {{if .Active}}checked{{end}} onchange="toggleTelegramFields()">
                            {{index .TranslatedText 0}}
                        </label>
                    </div>
                </div>

                <div class="field">
                    <label class="label">Bot Token</label>
                    <div class="control">
                        <input class="input telegram-field" type="text" name="token0815" placeholder="{{ .Token }}" {{if not .Active}}disabled{{end}}>
                    </div>
                </div>

                <div class="field">
                    <label class="label">Chat ID</label>
                    <div class="control">
                        <input class="input telegram-field" type="text" name="chatid" placeholder="{{ .ChatID }}" {{if not .Active}}disabled{{end}}>
                    </div>
                </div>

                <div class="control">
                    <button class="button is-link telegram-field" {{if not .Active}}disabled{{end}}>{{index .TranslatedText 1}}</button>
                </div>

                <br>
                {{ if .ShowStatus }}<span class="tag {{.Color}} is-normal">{{.StatusMessage}}</span>{{end}}


            </form>

        </div>

        <div class="column is-narrow">
            {{index .TranslatedText 2}}
        </div>



    </div>

    <script>
        function toggleTelegramFields() {
            const isActive = document.getElementById('telegram-active').checked;
            const fields = document.querySelectorAll('.telegram-field');
            fields.forEach(field => {
                field.disabled = !isActive;
                if (isActive) {
                    field.classList.remove('is-disabled');
                } else {
                    field.classList.add('is-disabled');
                }
            });
        }
    </script>
</div>
