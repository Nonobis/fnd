<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Frigate Notification Service</title>
    <link rel="stylesheet" href="/static/bulma.min.css">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="/static/htmx.min.js"></script>
    <script>
        // Global function for mobile menu toggle
        function toggleMobileMenu() {
            const sidebar = document.getElementById('navigation-section');
            const hamburger = document.getElementById('hamburger-toggle');
            const body = document.body;
            const main = document.querySelector('.app-main');
            
            if (window.innerWidth <= 768) {
                // Mobile behavior
                sidebar.classList.toggle('mobile-menu-open');
                hamburger.classList.toggle('active');
                body.classList.toggle('menu-open');
            } else {
                // Desktop behavior - collapse/expand
                sidebar.classList.toggle('collapsed');
                hamburger.classList.toggle('active');
                if (main) {
                    main.classList.toggle('sidebar-collapsed');
                }
                
                // Store preference in localStorage
                const isCollapsed = sidebar.classList.contains('collapsed');
                localStorage.setItem('sidebar-collapsed', isCollapsed.toString());
            }
        }

        // Wait for DOM to be ready
        document.addEventListener('DOMContentLoaded', function() {
            // Listen for language change event and update UI sections
            document.body.addEventListener('languageChanged', function(evt) {
                // Update header section
                htmx.ajax('GET', '/htmx/header.html', {
                    target: '#header-section',
                    swap: 'innerHTML'
                });
                
                // Update navigation section
                htmx.ajax('GET', '/htmx/navigation.html', {
                    target: '#navigation-section',
                    swap: 'innerHTML'
                });
                
                // Update overview section
                htmx.ajax('GET', '/htmx/overview.html', {
                    target: '#main',
                    swap: 'innerHTML'
                });
            });

            // Close mobile menu when clicking on a menu item
            document.addEventListener('click', function(e) {
                if (e.target.closest('.menu-link') && window.innerWidth <= 768) {
                    const sidebar = document.getElementById('navigation-section');
                    const hamburger = document.getElementById('hamburger-toggle');
                    const body = document.body;
                    
                    sidebar.classList.remove('mobile-menu-open');
                    hamburger.classList.remove('active');
                    body.classList.remove('menu-open');
                }
            });

            // Close mobile menu when clicking outside
            document.addEventListener('click', function(e) {
                if (window.innerWidth <= 768) {
                    const sidebar = document.getElementById('navigation-section');
                    const hamburger = document.getElementById('hamburger-toggle');
                    const body = document.body;
                    
                    if (!sidebar.contains(e.target) && !hamburger.contains(e.target) && sidebar.classList.contains('mobile-menu-open')) {
                        sidebar.classList.remove('mobile-menu-open');
                        hamburger.classList.remove('active');
                        body.classList.remove('menu-open');
                    }
                }
            });

            // Handle window resize
            window.addEventListener('resize', function() {
                const sidebar = document.getElementById('navigation-section');
                const hamburger = document.getElementById('hamburger-toggle');
                const body = document.body;
                const main = document.querySelector('.app-main');
                
                if (window.innerWidth > 768) {
                    // Clean up mobile states
                    sidebar.classList.remove('mobile-menu-open');
                    body.classList.remove('menu-open');
                    
                    // Restore desktop collapsed state from localStorage
                    const isCollapsed = localStorage.getItem('sidebar-collapsed') === 'true';
                    if (isCollapsed) {
                        sidebar.classList.add('collapsed');
                        hamburger.classList.add('active');
                        if (main) {
                            main.classList.add('sidebar-collapsed');
                        }
                    }
                } else {
                    // Clean up desktop states
                    sidebar.classList.remove('collapsed');
                    if (main) {
                        main.classList.remove('sidebar-collapsed');
                    }
                }
            });

            // Initialize sidebar state on page load
            if (window.innerWidth > 768) {
                const sidebar = document.getElementById('navigation-section');
                const hamburger = document.getElementById('hamburger-toggle');
                const main = document.querySelector('.app-main');
                
                // Restore collapsed state from localStorage
                const isCollapsed = localStorage.getItem('sidebar-collapsed') === 'true';
                if (isCollapsed) {
                    sidebar.classList.add('collapsed');
                    hamburger.classList.add('active');
                    if (main) {
                        main.classList.add('sidebar-collapsed');
                    }
                }
            }
        });
    </script>
</head>

<body>
    <!-- Modern Header -->
    <header class="app-header">
        <div class="header-content">
            <div class="header-left">
                <button class="hamburger-menu" id="hamburger-toggle" onclick="toggleMobileMenu()">
                    <span class="hamburger-line"></span>
                    <span class="hamburger-line"></span>
                    <span class="hamburger-line"></span>
                </button>
                
                <div class="brand">
                    <h1 class="brand-title">
                        <span class="brand-icon">
                            <i class="fas fa-shield-alt"></i>
                        </span>
                        <span>{{index .TranslatedText 0}}</span>
                    </h1>
                </div>
            </div>
            <div class="header-right">
                <div class="header-controls">
                    <!-- Version Badge -->
                    <div class="version-badge">
                        <span class="tag is-primary is-light">
                            <span class="icon">
                                <i class="fas fa-code-branch"></i>
                            </span>
                            <span>v{{.Version}}</span>
                        </span>
                    </div>
                    
                    <!-- Compact Language Selector -->
                    <div class="language-selector">
                        <div class="dropdown is-hoverable is-right">
                            <div class="dropdown-trigger">
                                <button class="button is-small is-rounded is-light" aria-haspopup="true" aria-controls="dropdown-menu" title="{{ .CurrentLanguage.Name }}">
                                    <span class="icon">
                                        <span>{{ .CurrentLanguage.Flag }}</span>
                                    </span>
                                    <span class="icon is-small">
                                        <i class="fas fa-chevron-down"></i>
                                    </span>
                                </button>
                            </div>
                            <div class="dropdown-menu" id="dropdown-menu" role="menu">
                                <div class="dropdown-content">
                                    {{ range .SupportedLanguages }}
                                    <a class="dropdown-item {{if eq .Code $.CurrentLanguage.Code}}is-active{{end}}" 
                                       hx-post="/htmx/language.html?lang={{ .Code }}" 
                                       hx-target="#lang-info"
                                       hx-trigger="click"
                                       title="{{ .Name }}">
                                        <span class="icon">
                                            <span>{{ .Flag }}</span>
                                        </span>
                                        <span>{{ .Name }}</span>
                                    </a>
                                    {{ end }}
                                </div>
                            </div>
                        </div>
                        <div id="lang-info"></div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content Area -->
    <div class="app-container">


        <div class="app-layout">
            <aside class="app-sidebar" id="navigation-section">
                {{ template "navigation.html" .}}
            </aside>

            <main class="app-main">
                <div class="main-content" id="main">
                    {{ template "overview.html" .}}
                </div>
            </main>
        </div>
    </div>



</body>

</html>
