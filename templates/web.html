<div id="web-settings">
    <div class="columns">
        
        <div class="column is-narrow">
            <h3 class="title is-3">Web Notifications</h3>
            <form hx-post="/htmx/web.html" hx-target="#web-settings" hx-swap="outerHTML">

                <label class="label">{{index .TranslatedText 0}}</label>
                <div class="field">
                    <div class="control">
                        <label class="checkbox">
                            <input type="checkbox" name="active" id="web-active" {{if .Active}}checked{{end}} onchange="toggleWebFields()">
                            {{index .TranslatedText 0}}
                        </label>
                    </div>
                </div>

                <div class="control">
                    <button class="button is-link web-field" {{if not .Active}}disabled{{end}}>{{index .TranslatedText 1}}</button>
                </div>

                <br>
                {{ if .ShowStatus }}<span class="tag {{.Color}} is-normal">{{.StatusMessage}}</span>{{end}}

            </form>

        </div>

        <div class="column is-narrow">
            <div class="content">
                <h4>Information</h4>
                <p>Web notifications are displayed in the overview section of this interface.</p>
                <p>This service is typically always enabled to show notifications in the web UI.</p>
            </div>
        </div>

    </div>

    <script>
        function toggleWebFields() {
            const isActive = document.getElementById('web-active').checked;
            const fields = document.querySelectorAll('.web-field');
            fields.forEach(field => {
                field.disabled = !isActive;
                if (isActive) {
                    field.classList.remove('is-disabled');
                } else {
                    field.classList.add('is-disabled');
                }
            });
        }
    </script>
</div>
