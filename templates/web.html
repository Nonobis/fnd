<div id="web-einstellungen">
    <div class="columns">
        
        <div class="column is-narrow">
            <h3 class="title is-3">Web Notifications</h3>
            <form hx-post="/htmx/web.html" hx-target="#web-einstellungen" hx-swap="outerHTML">

                <label class="label">{{index .TranslatedText 0}}</label>
                <div class="field">
                    <div class="control">
                        <label class="checkbox">
                            <input type="checkbox" name="aktiv" {{if .Active}}checked{{end}}>
                            {{index .TranslatedText 0}}
                        </label>
                    </div>
                </div>

                <div class="control">
                    <button class="button is-link">{{index .TranslatedText 1}}</button>
                </div>

                <br>
                {{ if .ShowStatus }}<span class="tag {{.Color}} is-normal">{{.StatusMessage}}</span>{{end}}

            </form>

        </div>

        <div class="column is-narrow">
            <div class="content">
                <h4>Information</h4>
                <p>Web notifications are displayed in the overview section of this interface.</p>
                <p>This service is typically always enabled to show notifications in the web UI.</p>
            </div>
        </div>

    </div>
</div>
