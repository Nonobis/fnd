<div class="camera-config-modal">
    <!-- Back Button -->
    <div class="mb-4">
        <button class="button is-light" onclick="closeCameraModal()">
            <span class="icon">
                <i class="fas fa-arrow-left"></i>
            </span>
            <span>Back to Cameras</span>
        </button>
    </div>

    <!-- Configuration Form -->
    <form id="object-filter-form" hx-post="/api/object-filters/camera/{{.CameraName}}" hx-target="#form-response" hx-swap="outerHTML">
        <!-- Enable/Disable Filter -->
        <div class="field">
            <div class="control">
                <label class="checkbox">
                    <input type="checkbox" name="enabled" value="true" {{if .Camera.ObjectFilter.Enabled}}checked{{end}}>
                    <strong>Enable object filtering for this camera</strong>
                </label>
            </div>
            <p class="help">When enabled, only events with the selected objects will trigger notifications</p>
        </div>

        <div id="filter-options" {{if not .Camera.ObjectFilter.Enabled}}style="display: none;"{{end}}>
            <!-- Quick Select Buttons -->
            <div class="quick-select">
                <label class="label">Quick Select</label>
                <div class="buttons">
                    <button type="button" class="button is-small is-info" onclick="selectCommonObjects()">
                        <span class="icon">
                            <i class="fas fa-users"></i>
                        </span>
                        <span>People & Vehicles</span>
                    </button>
                    <button type="button" class="button is-small is-success" onclick="selectAnimals()">
                        <span class="icon">
                            <i class="fas fa-paw"></i>
                        </span>
                        <span>Animals</span>
                    </button>
                    <button type="button" class="button is-small is-warning" onclick="selectAll()">
                        <span class="icon">
                            <i class="fas fa-check-double"></i>
                        </span>
                        <span>Select All</span>
                    </button>
                    <button type="button" class="button is-small is-danger" onclick="clearSelection()">
                        <span class="icon">
                            <i class="fas fa-times"></i>
                        </span>
                        <span>Clear All</span>
                    </button>
                </div>
            </div>

            <!-- Search Box -->
            <div class="search-box">
                <div class="field">
                    <label class="label">Search Objects</label>
                    <div class="control has-icons-left">
                        <input class="input" type="text" id="object-search" placeholder="Type to search objects...">
                        <span class="icon is-small is-left">
                            <i class="fas fa-search"></i>
                        </span>
                    </div>
                </div>
            </div>

            <!-- Selected Count -->
            <div class="selected-count" id="selected-count">
                Selected: 0 objects
            </div>

            <!-- Objects Grid -->
            <div class="object-grid" id="objects-grid">
                {{range .AvailableObjects}}
                <div class="object-item" data-object="{{.}}">
                    <label class="checkbox">
                        <input type="checkbox" name="objects" value="{{.}}" 
                               {{if contains $.Camera.ObjectFilter.Objects .}}checked{{end}}>
                        {{.}}
                    </label>
                </div>
                {{end}}
            </div>
        </div>

        <!-- Form Actions -->
        <div class="form-actions">
            <button class="button is-primary" type="submit">
                <span class="icon">
                    <i class="fas fa-save"></i>
                </span>
                <span>Save Configuration</span>
            </button>
            <button type="button" class="button is-light" onclick="closeCameraModal()">
                <span class="icon">
                    <i class="fas fa-times"></i>
                </span>
                <span>Cancel</span>
            </button>
        </div>
    </form>

    <!-- Response Area -->
    <div id="form-response"></div>
</div>

<style>
.camera-config-modal {
    padding: 0;
    max-width: 100%;
    overflow-x: auto;
}

.object-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 0.5rem;
    margin-top: 1rem;
}

.object-item {
    display: flex;
    align-items: center;
    padding: 0.5rem;
    border: 1px solid #dbdbdb;
    border-radius: 4px;
    background: #fafafa;
    color: #000000;
}

.object-item:hover {
    background: #f0f0f0;
}

.object-item input[type="checkbox"] {
    margin-right: 0.5rem;
}

.object-item label {
    color: #000000;
    font-weight: 500;
}

.search-box {
    margin-bottom: 1rem;
}

.selected-count {
    margin-top: 1rem;
    font-weight: bold;
    color: #3273dc;
}

.quick-select {
    margin-bottom: 1rem;
}

.quick-select .buttons {
    margin-bottom: 0.5rem;
}

.form-actions {
    display: flex;
    gap: 1rem;
    padding-top: 1.5rem;
    border-top: 1px solid #f1f3f4;
    margin-top: 1.5rem;
}

.checkbox {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    font-weight: 500;
    color: #000000;
    padding: 0.5rem;
    border-radius: 8px;
    transition: all 0.3s ease;
}

.checkbox:hover {
    background: rgba(52, 152, 219, 0.1);
}

.checkbox input[type="checkbox"] {
    transform: scale(1.2);
    accent-color: #3498db;
}
</style>

<script>
    // Toggle filter options visibility
    document.querySelector('input[name="enabled"]').addEventListener('change', function() {
        const filterOptions = document.getElementById('filter-options');
        filterOptions.style.display = this.checked ? 'block' : 'none';
        updateSelectedCount();
    });

    // Search functionality
    document.getElementById('object-search').addEventListener('input', function() {
        const searchTerm = this.value.toLowerCase();
        const objectItems = document.querySelectorAll('.object-item');
        
        objectItems.forEach(item => {
            const objectName = item.getAttribute('data-object').toLowerCase();
            if (objectName.includes(searchTerm)) {
                item.style.display = 'block';
            } else {
                item.style.display = 'none';
            }
        });
    });

    // Update selected count
    function updateSelectedCount() {
        const checkboxes = document.querySelectorAll('input[name="objects"]:checked');
        const countElement = document.getElementById('selected-count');
        countElement.textContent = `Selected: ${checkboxes.length} objects`;
    }

    // Add event listeners to all checkboxes
    document.querySelectorAll('input[name="objects"]').forEach(checkbox => {
        checkbox.addEventListener('change', updateSelectedCount);
    });

    // Quick select functions
    function selectCommonObjects() {
        const commonObjects = ['person', 'car', 'truck', 'bicycle', 'motorcycle', 'bus'];
        selectObjects(commonObjects);
    }

    function selectAnimals() {
        const animals = ['bird', 'cat', 'dog', 'horse', 'sheep', 'cow', 'elephant', 'bear', 'zebra', 'giraffe'];
        selectObjects(animals);
    }

    function selectAll() {
        const checkboxes = document.querySelectorAll('input[name="objects"]');
        checkboxes.forEach(checkbox => {
            checkbox.checked = true;
        });
        updateSelectedCount();
    }

    function clearSelection() {
        const checkboxes = document.querySelectorAll('input[name="objects"]');
        checkboxes.forEach(checkbox => {
            checkbox.checked = false;
        });
        updateSelectedCount();
    }

    function selectObjects(objects) {
        const checkboxes = document.querySelectorAll('input[name="objects"]');
        checkboxes.forEach(checkbox => {
            checkbox.checked = objects.includes(checkbox.value);
        });
        updateSelectedCount();
    }

    // Initialize selected count
    document.addEventListener('DOMContentLoaded', function() {
        updateSelectedCount();
    });
</script>
