name: Docker Build and Publish

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'Makefile'
      - 'Changelog.md'
  pull_request:
    branches: [ main ]
    types: [ opened, synchronize, reopened ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  BUILD_VERSION: ${{ github.ref_name }}
  BUILD_DATE: ${{ github.event.head_commit.timestamp }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Get version from Makefile
      id: version
      run: |
        if [ -f Makefile ]; then
          VERSION=$(grep '^VERSION=' Makefile | cut -d'=' -f2)
          echo "version=$VERSION" >> $GITHUB_ENV
        else
          echo "version=${{ github.ref_name }}" >> $GITHUB_ENV
        fi

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'

    - name: Build Go application
      run: |
        mkdir -p bin
        go build -o bin/fnd -ldflags "-X main.version=${{ env.version }}"

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Generate version based on event type
      id: build_version
      run: |
        VERSION=${{ env.version }}
        COMMIT_SHA=${GITHUB_SHA:0:7}
        
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          # PR build - generate alpha version
          PR_NUMBER=${{ github.event.number }}
          BUILD_VERSION="${VERSION}-alpha.pr${PR_NUMBER}.${COMMIT_SHA}"
          echo "build_type=alpha" >> $GITHUB_ENV
          echo "pr_number=$PR_NUMBER" >> $GITHUB_ENV
        else
          # Direct commit to main - generate release version
          BUILD_VERSION="${VERSION}-${COMMIT_SHA}"
          echo "build_type=release" >> $GITHUB_ENV
        fi
        
        echo "build_version=$BUILD_VERSION" >> $GITHUB_ENV
        echo "Generated version: $BUILD_VERSION"

    - name: Extract metadata for PRs (Alpha)
      id: meta-alpha
      if: github.event_name == 'pull_request'
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=raw,value=${{ env.build_version }}
          type=raw,value=latest-dev
          type=raw,value=pr-${{ github.event.number }}
        labels: |
          org.opencontainers.image.title=FND
          org.opencontainers.image.description=Frigate Notification Daemon (Alpha Build)
          org.opencontainers.image.vendor=${{ github.repository_owner }}
          org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          org.opencontainers.image.revision=${{ github.sha }}
          org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
          org.opencontainers.image.version=${{ env.build_version }}
          org.opencontainers.image.documentation=Alpha build from PR #${{ github.event.number }}

    - name: Extract metadata for main commits (Release)
      id: meta-release
      if: github.event_name == 'push'
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=raw,value=${{ env.build_version }}
          type=raw,value=${{ env.version }}
        labels: |
          org.opencontainers.image.title=FND
          org.opencontainers.image.description=Frigate Notification Daemon
          org.opencontainers.image.vendor=${{ github.repository_owner }}
          org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          org.opencontainers.image.revision=${{ github.sha }}
          org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
          org.opencontainers.image.version=${{ env.build_version }}

    - name: Display build information
      run: |
        echo "=== Build Information ==="
        echo "Event: ${{ github.event_name }}"
        echo "Base Version: ${{ env.version }}"
        echo "Build Version: ${{ env.build_version }}"
        echo "Build Type: ${{ env.build_type }}"
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          echo "PR Number: ${{ github.event.number }}"
        fi
        echo "Target Tags: ${{ github.event_name == 'pull_request' && steps.meta-alpha.outputs.tags || steps.meta-release.outputs.tags }}"
        echo "Commit SHA: ${{ github.sha }}"
        echo "========================"

    - name: Build and push Docker image (Alpha)
      if: github.event_name == 'pull_request'
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./docker/Dockerfile
        push: true
        tags: ${{ steps.meta-alpha.outputs.tags }}
        labels: ${{ steps.meta-alpha.outputs.labels }}
        build-args: |
          BUILD_VERSION=${{ env.build_version }}
          BUILD_DATE=${{ env.BUILD_DATE }}
          VCS_REF=${{ github.sha }}
          VCS_URL=${{ github.server_url }}/${{ github.repository }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and push Docker image (Release)
      if: github.event_name == 'push'
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./docker/Dockerfile
        push: true
        tags: ${{ steps.meta-release.outputs.tags }}
        labels: ${{ steps.meta-release.outputs.labels }}
        build-args: |
          BUILD_VERSION=${{ env.build_version }}
          BUILD_DATE=${{ env.BUILD_DATE }}
          VCS_REF=${{ github.sha }}
          VCS_URL=${{ github.server_url }}/${{ github.repository }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Display pushed images (Alpha)
      if: github.event_name == 'pull_request'
      run: |
        echo "=== Successfully pushed alpha images ==="
        echo "🔧 Alpha images for PR #${{ github.event.number }}:"
        echo "${{ steps.meta-alpha.outputs.tags }}" | tr ',' '\n' | sed 's/^/  - /'
        echo ""
        echo "💡 To use this alpha version:"
        echo "  docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest-dev"
        echo "  docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.build_version }}"
        echo "================================="

    - name: Display pushed images (Release)
      if: github.event_name == 'push'
      run: |
        echo "=== Successfully pushed release images ==="
        echo "🚀 Release images for main branch:"
        echo "${{ steps.meta-release.outputs.tags }}" | tr ',' '\n' | sed 's/^/  - /'
        echo ""
        echo "💡 To use this release version:"
        echo "  docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
        echo "  docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.build_version }}"
        echo "  docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.version }}"
        echo "================================="
