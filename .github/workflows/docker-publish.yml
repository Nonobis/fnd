name: Docker Build and Publish

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
    types: [ opened, synchronize, reopened ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  BUILD_VERSION: ${{ github.ref_name }}
  BUILD_DATE: ${{ github.event.head_commit.timestamp }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Get version from Makefile
      id: version
      run: |
        if [ -f Makefile ]; then
          VERSION=$(grep '^VERSION=' Makefile | cut -d'=' -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
        else
          echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
        fi

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'

    - name: Build Go application
      run: |
        mkdir -p bin
        go build -o bin/fnd -ldflags "-X main.version=${{ steps.version.outputs.version }}"

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Generate alpha version for PR
      id: alpha_version
      if: github.event_name == 'pull_request'
      run: |
        VERSION=${{ steps.version.outputs.version }}
        PR_NUMBER=${{ github.event.number }}
        COMMIT_SHA=${GITHUB_SHA:0:7}
        ALPHA_VERSION="${VERSION}-alpha.pr${PR_NUMBER}.${COMMIT_SHA}"
        echo "alpha_version=$ALPHA_VERSION" >> $GITHUB_OUTPUT
        echo "Generated alpha version: $ALPHA_VERSION"

    - name: Extract metadata for main/tags
      id: meta-main
      if: github.event_name != 'pull_request'
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern={{major}}
          type=raw,value=latest,enable={{is_default_branch}}
        labels: |
          org.opencontainers.image.title=FND
          org.opencontainers.image.description=Frigate Notification Daemon
          org.opencontainers.image.vendor=${{ github.repository_owner }}
          org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          org.opencontainers.image.revision=${{ github.sha }}
          org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
          org.opencontainers.image.version=${{ steps.version.outputs.version }}

    - name: Extract metadata for PRs (Alpha)
      id: meta-alpha
      if: github.event_name == 'pull_request'
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=raw,value=${{ steps.alpha_version.outputs.alpha_version }}
          type=raw,value=latest-dev
          type=raw,value=pr-${{ github.event.number }}
        labels: |
          org.opencontainers.image.title=FND
          org.opencontainers.image.description=Frigate Notification Daemon (Alpha Build)
          org.opencontainers.image.vendor=${{ github.repository_owner }}
          org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          org.opencontainers.image.revision=${{ github.sha }}
          org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
          org.opencontainers.image.version=${{ steps.alpha_version.outputs.alpha_version }}
          org.opencontainers.image.documentation=Alpha build from PR #${{ github.event.number }}

    - name: Display build information
      run: |
        echo "=== Build Information ==="
        echo "Event: ${{ github.event_name }}"
        echo "Base Version: ${{ steps.version.outputs.version }}"
        if [ "${{ github.event_name }}" == "pull_request" ]; then
          echo "Alpha Version: ${{ steps.alpha_version.outputs.alpha_version }}"
          echo "PR Number: ${{ github.event.number }}"
          echo "Target Tags: ${{ steps.meta-alpha.outputs.tags }}"
        else
          echo "Target Tags: ${{ steps.meta-main.outputs.tags }}"
        fi
        echo "Commit SHA: ${{ github.sha }}"
        echo "========================"

    - name: Build and push Docker image (Main/Tags)
      if: github.event_name != 'pull_request'
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./docker/Dockerfile
        push: true
        tags: ${{ steps.meta-main.outputs.tags }}
        labels: ${{ steps.meta-main.outputs.labels }}
        build-args: |
          BUILD_VERSION=${{ steps.version.outputs.version }}
          BUILD_DATE=${{ env.BUILD_DATE }}
          VCS_REF=${{ github.sha }}
          VCS_URL=${{ github.server_url }}/${{ github.repository }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and push Docker image (Alpha)
      if: github.event_name == 'pull_request'
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./docker/Dockerfile
        push: true
        tags: ${{ steps.meta-alpha.outputs.tags }}
        labels: ${{ steps.meta-alpha.outputs.labels }}
        build-args: |
          BUILD_VERSION=${{ steps.alpha_version.outputs.alpha_version }}
          BUILD_DATE=${{ env.BUILD_DATE }}
          VCS_REF=${{ github.sha }}
          VCS_URL=${{ github.server_url }}/${{ github.repository }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Display pushed images
      run: |
        echo "=== Successfully pushed images ==="
        if [ "${{ github.event_name }}" == "pull_request" ]; then
          echo "🔧 Alpha images for PR #${{ github.event.number }}:"
          echo "${{ steps.meta-alpha.outputs.tags }}" | tr ',' '\n' | sed 's/^/  - /'
          echo ""
          echo "💡 To use this alpha version:"
          echo "  docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest-dev"
          echo "  docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.alpha_version.outputs.alpha_version }}"
        else
          echo "📦 Production images:"
          echo "${{ steps.meta-main.outputs.tags }}" | tr ',' '\n' | sed 's/^/  - /'
        fi
        echo "================================="
